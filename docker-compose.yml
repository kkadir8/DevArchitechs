services:
  db:
    image: postgres:16-alpine
    container_name: smartscheduler-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartscheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartscheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./SmartScheduler.API
      dockerfile: Dockerfile
    container_name: smartscheduler-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=smartscheduler;Username=postgres;Password=postgres123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./smartscheduler-frontend
      dockerfile: Dockerfile
    container_name: smartscheduler-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api

volumes:
  pgdata:
    name: smartscheduler-pgdata
