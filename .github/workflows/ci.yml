name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Build ───────────────────────────────────────────
  build-backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore packages
        run: dotnet restore SmartScheduler.API/SmartScheduler.API.csproj

      - name: Build
        run: dotnet build SmartScheduler.API/SmartScheduler.API.csproj --no-restore -c Release

      - name: Publish (smoke test)
        run: dotnet publish SmartScheduler.API/SmartScheduler.API.csproj --no-build -c Release -o /tmp/api-publish

  # ─── Frontend Build ──────────────────────────────────────────
  build-frontend:
    name: Frontend (Next.js 14)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: smartscheduler-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: smartscheduler-frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: smartscheduler-frontend

      - name: Build
        run: npm run build
        working-directory: smartscheduler-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000

  # ─── Docker Build (push to main only) ───────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./SmartScheduler.API
          push: false
          tags: smartscheduler-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./smartscheduler-frontend
          push: false
          tags: smartscheduler-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
